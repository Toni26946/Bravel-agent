# fly.monitor.toml — bravel-monitor (zaseban dijagnosticki bot)
# Deploy:  fly deploy -c fly.monitor.toml
# Koristi isti Dockerfile/image kao glavni bot, ali pokrece monitor.py.
app = 'bravel-monitor'
primary_region = 'ams'

[build]
  # koristi Dockerfile iz repozitorija (isti image kao glavni bot)

[env]
  PORT = '8080'

[processes]
  app = 'python monitor.py'

# Bez volumena: monitor.db je ephemeral (unutar kontejnera). Dijagnosticki
# bot ne treba trajnu pohranu — povijest se gubi na restart, ali alarmi
# se salju u stvarnom vremenu. Kod ima fallback na ./monitor.db (monitor.py).

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  processes = ['app']
