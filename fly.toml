# fly.toml app configuration file generated for bravel-agent on 2026-07-01T11:52:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bravel-agent'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[vm]]
  size = 'shared-cpu-1x'
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
  processes = ['app']
