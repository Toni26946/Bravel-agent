# fly.toml — bravel-agent (Telegram bot, polling, bez HTTP prometa)
app = 'bravel-agent'
primary_region = 'ams'

[build]
  # koristi Dockerfile iz repozitorija

[processes]
  app = 'python main.py'

[mounts]
  source = 'data'
  destination = '/data'
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  processes = ['app']
