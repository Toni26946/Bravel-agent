name: Fly Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:   # ručno pokretanje (npr. primjena staged fly secreta bez promjene koda)
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Buildx s docker-container driverom -> podrzava GitHub Actions cache.
      - uses: docker/setup-buildx-action@v3

      # Prijava na Fly registry (username je bilo sto; lozinka = Fly token).
      - name: Prijava na Fly registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      # Build + push s trajnim layer-cacheom u GitHub Actions cachu.
      # Kad se requirements.txt ne mijenja, 'pip install' sloj se vrati iz
      # cachea (sekunde) umjesto ponovne instalacije + hladnog Fly buildera.
      - name: Build i push (GitHub Actions layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: registry.fly.io/bravel-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy gotove slike -> Fly NE gradi, samo povuce image i azurira mašine.
      - name: Deploy gotove slike
        run: flyctl deploy --app bravel-agent --image registry.fly.io/bravel-agent:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
